name: ubuntu-24.04
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Run hadolint
      uses: hadolint/hadolint-action@v3.3.0
      with:
        dockerfile: ubuntu-24.04/Dockerfile
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Docker
      uses: docker/setup-docker-action@v5
      with:
        daemon-config: |
          {
            "debug": true,
            "features": {
              "containerd-snapshotter": true
            }
          }

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/eoscloud/act-runner-images
        tags: |
          type=raw,value=ubuntu-latest,enable={{is_default_branch}}
          type=raw,value=ubuntu-24.04,enable={{is_default_branch}}
          type=sha

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        platforms: linux/amd64,linux/arm64
        pull: true
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        context: ./ubuntu-24.04
        cache-from: type=gha
        cache-to: type=gha
